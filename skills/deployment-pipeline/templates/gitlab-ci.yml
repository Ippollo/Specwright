stages:
  - lint
  - test
  - build
  - deploy

image: node:20-alpine

cache:
  paths:
    - node_modules/

lint:
  stage: lint
  script:
    - npm ci
    - npm run lint

test:
  stage: test
  script:
    - npm ci
    - npm run test:ci

build:
  stage: build
  script:
    - docker build -t myapp:latest .
  only:
    - main

deploy_staging:
  stage: deploy
  script:
    - echo "Deploying to staging..."
  environment:
    name: staging
  only:
    - main
